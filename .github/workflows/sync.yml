name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'      # 每天北京时间早上 10 点左右自动运行
  workflow_dispatch:         # 支持手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    # 只在 Fork 仓库中运行，原仓库不运行
    if: github.repository != '你的用户名/你的仓库名'

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6

      - name: Sync upstream changes
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
        with:
          upstream_sync_repo: 原作者用户名/原仓库名     # ← 改成你 Fork 的原仓库
          upstream_sync_branch: main                    # 原仓库默认分支
          target_sync_branch: main                      # 你 Fork 后要同步的分支
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
